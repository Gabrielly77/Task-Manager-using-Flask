name: CI Pipeline com Segurança
on: [push, pull_request]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Instalar ferramentas de segurança
        run: pip install bandit safety
      - name: Executar Bandit (Análise de Código)
        run: bandit -r . -f txt -o bandit-report.txt
        continue-on-error: true
      - name: Executar Safety (Análise de Dependências)
        run: safety check -r requirements.txt
        continue-on-error: true

  deploy-stage:
    needs: security-analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Deploy em Estágio (Review App)
        run: |
          echo "Criando ambiente temporário de stage..."
          docker run -d -p 8080:5000 --name stage-app task-manager
      
      - name: DAST (OWASP ZAP) no Estágio
        run: |
          echo "Executando DAST..."
          docker run -t owasp/zap2docker-stable zap-baseline.py -t http://192.168.98.10:8080 || true

  security-monitoring:
    needs: deploy-stage
    runs-on: ubuntu-latest
    steps:
      - name: Simulação de Monitoramento (Wazuh/ELK)
        run: |
          echo "Conectando ao agente de log..."
          echo "Analisando logs de autenticação para detectar força bruta..."
          # Aqui simulamos a leitura de um log de erro
          grep "FAILED LOGIN" app.log || echo "Nenhuma tentativa de força bruta detectada no momento."
